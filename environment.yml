name: act
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.8.10
  - pip=23.3.1
  - setuptools=68.2.2
  - wheel=0.41.2
  
  # CUDA 11.8 运行时
  - cudatoolkit=11.8.0
  - cudnn=8.7.0.84
  
  # PyTorch (CUDA 11.8版本)
  - pytorch=2.0.1
  - torchvision=0.15.2
  - pytorch-cuda=11.8
  
  # 基础科学计算
  - numpy=1.24.3
  - scipy=1.10.1
  - pandas=2.0.3
  
  # 图像处理
  - opencv=4.7.0
  
  # 数据处理
  - h5py=3.8.0
  - hdf5=1.12.1
  
  # 可视化
  - matplotlib=3.7.1
  
  # 配置文件
  - pyyaml=6.0
  
  # 工具库
  - tqdm=4.65.0
  - einops=0.6.1
  - packaging=23.1
  
  # 交互式环境
  - ipython=8.12.2
  - jupyter=1.0.0
  
  - pip:
    # 机器人仿真
    - mujoco==2.3.7
    - dm-control==1.0.14
    - pyquaternion==0.9.9
    
    # ROS相关（可选，用于真实机器人）
    - rospkg==1.5.0
    - pexpect==4.8.0
    
    # 深度学习工具
    - tensorboard==2.13.0
    - wandb==0.15.8
    
    # 图像处理增强
    - opencv-python==4.7.0.72
    - pillow==9.5.0
    
    # 代码质量
    - black==23.7.0
    - flake8==6.1.0
